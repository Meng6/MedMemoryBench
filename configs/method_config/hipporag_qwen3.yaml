# HippoRAG 2 Agent Configuration
# HippoRAG 2: A Powerful Graph-Based RAG Framework
# GitHub: https://github.com/OSU-NLP-Group/HippoRAG
# Paper: https://arxiv.org/abs/2405.14831

method_name: "hipporag"
method_type: "graph_rag"
description: "HippoRAG 2 - Graph-based RAG with OpenIE and Personalized PageRank"

# ============================================================================
# Main Model Configuration
# ============================================================================
model:
  provider: "openai"
  name: "Qwen3-235B-A22B"
  temperature: 0.3
  max_completion_tokens: 10000

# ============================================================================
# Embedding Configuration (Local Model)
# ============================================================================
embedding:
  provider: "local"
  model: "BAAI/bge-small-zh-v1.5"
  model_path: "/Users/cyan/WYH/models/bge-small-zh-v1.5"
  dim: 512

# ============================================================================
# HippoRAG Specific Parameters
# ============================================================================
agent_params:
  # --------------------------------------------------------------------------
  # OpenIE Mode
  # --------------------------------------------------------------------------
  # Options:
  # - "online": Real-time LLM calls for NER and triple extraction (default)
  # - "offline": Batch processing with vLLM (requires pre-setup)
  openie_mode: "online"

  # --------------------------------------------------------------------------
  # Graph Configuration
  # --------------------------------------------------------------------------
  is_directed_graph: false
  synonymy_edge_sim_threshold: 0.8
  synonymy_edge_topk: 2047         # k for knn retrieval in building synonymy edges

  # --------------------------------------------------------------------------
  # Retrieval Configuration
  # --------------------------------------------------------------------------
  linking_top_k: 5                 # Top-k linked nodes at each retrieval step
  retrieval_top_k: 200             # Number of documents to retrieve
  qa_top_k: 5                      # Number of documents to feed to QA model
  damping: 0.5                     # PPR damping factor (0.0-1.0)
  passage_node_weight: 0.05        # Weight for passage nodes in PPR

  # --------------------------------------------------------------------------
  # Cache Configuration
  # --------------------------------------------------------------------------
  force_index_from_scratch: false  # Force rebuild index even if exists
  force_openie_from_scratch: false # Force rebuild OpenIE results even if exists
  save_openie: true                # Save OpenIE extraction results to disk

  # --------------------------------------------------------------------------
  # Chunking Configuration
  # --------------------------------------------------------------------------
  chunk_size_tokens: 8192         # Maximum tokens per chunk
  chunk_overlap_tokens: 200        # Overlap between chunks

  # --------------------------------------------------------------------------
  # Embedding Settings
  # --------------------------------------------------------------------------
  embedding_batch_size: 16         # Batch size for embedding
  embedding_max_seq_len: 512       # Maximum sequence length for embedding

  # --------------------------------------------------------------------------
  # Token Limits
  # --------------------------------------------------------------------------
  max_input_tokens: 40960        # Maximum input tokens per request
  max_context_tokens: 40960       # Maximum context tokens

  # --------------------------------------------------------------------------
  # Working Directory (optional)
  # --------------------------------------------------------------------------
  # If not specified, uses system temp directory
  # working_dir: "/path/to/hipporag_workspace"
