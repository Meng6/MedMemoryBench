# BM25 RAG Agent Configuration

method_name: "bm25_rag"
method_type: "rag"
description: "BM25 RAG Agent - Sparse retrieval based RAG method"

model:
  provider: "openai"
  name: "gpt-5.1"
  temperature: 0.3
  max_completion_tokens: 10000

agent_params:
  top_k: 5
  k1: 1.5
  b: 0.75
  language: "auto"  # auto / zh / en
  chunk_size: 512
  chunk_overlap: 50
  max_context_tokens: 100000
