# Graph RAG Agent Configuration

method_name: "graph_rag"
method_type: "rag"
description: "Graph RAG Agent - Knowledge graph based RAG with concept extraction and graph traversal"

model:
  provider: "openai"
  name: "gpt-5.1"
  temperature: 0.3
  max_tokens: 10000

agent_params:
  top_k: 5
  chunk_size: 10240
  chunk_overlap: 200
  edges_threshold: 0.8

embedding:
  provider: "local"
  model: "/Users/cyan/WYH/models/bge-small-zh-v1.5"
