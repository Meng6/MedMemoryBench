# Mem0 Agent Configuration

method_name: "mem0"
method_type: "agentic_memory"
description: "Mem0 Agent - Agentic memory with automatic memory extraction and retrieval"

model:
  provider: "openai"
  name: "gpt-5.1"
  temperature: 0.3
  max_completion_tokens: 10000

agent_params:
  retrieve_num: 5
  chunk_size_tokens: 40960
  max_context_tokens: 128000

embedding:
  provider: "local"
  model: "/Users/cyan/WYH/models/bge-small-zh-v1.5"
