# Mem1-style Agent Configuration

method_name: "mem1"
method_type: "agentic_memory"
description: "Mem1-style compact memory consolidation with lightweight retrieval"

model:
  provider: "openai"
  name: "gpt-5.1"
  temperature: 0.3
  max_completion_tokens: 10000

agent_params:
  retrieve_num: 5
  max_state_tokens: 10240
  max_note_tokens: 4096
  note_keep: 500
  max_input_tokens: 40960
  max_context_tokens: 128000
