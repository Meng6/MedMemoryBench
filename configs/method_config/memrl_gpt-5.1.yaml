# MemRL Agent Configuration
# Value-driven procedural memory with Q-learning based retrieval

method_name: "memrl"
method_type: "agentic_memory"
description: "MemRL - value-driven procedural memory with Q-learning based retrieval and ε-greedy exploration"

model:
  provider: "openai"
  name: "gpt-5.1"
  temperature: 0.3
  max_completion_tokens: 10000

agent_params:
  retrieve_num: 2                   
  candidate_top_k: 20               
  similarity_threshold: 0.2          

  max_new_items_per_memorize: 8      # Max new memory items per memorize call
  max_experience_tokens: 700         # Max tokens per experience/trajectory
  memorize_chunk_tokens: 6000        # Chunk size for memorization (tokens)
  memorize_chunk_overlap_tokens: 200 # Overlap between chunks
  query_memory_item_tokens: 300      # Max tokens per memory item in query
  query_memory_context_tokens: 1800  # Max total tokens for memory context
  max_concurrent_api_calls: 4        # Concurrent API calls for parallel processing

  build_strategy: "proceduralization"  # trajectory | script | proceduralization
  retrieve_strategy: "query"           # random | query | avefact
  update_strategy: "adjustment"        # vanilla | validation | adjustment

  # Q-learning / RL configuration
  epsilon: 0.1                       # ε-greedy exploration probability
  gamma: 0.0                         # Discount factor (0 for single-step)
  learning_rate: 0.2                 # Q-learning step size (alpha)
  initial_q: 0.5                     # Initial Q-value for new memories
  q_init_pos: 0.5                    # Q-value init for positive samples
  q_init_neg: 0.0                    # Q-value init for negative samples
  success_reward: 1.0                # Reward for successful use
  failure_reward: -1.0               # Reward for failed use
  weight_sim: 0.5                    # Weight for similarity in hybrid scoring
  weight_q: 0.5                      # Weight for Q-value in hybrid scoring
  utility_mix_lambda: 0.6            # Lambda for utility mixing

  max_input_tokens: 8000             # Max input tokens for memorization
  max_context_tokens: 20480        # Max context window tokens
  max_question_tokens: 4096          # Max question tokens

embedding:
  provider: "local"
  model: "bge-small-zh-v1.5"
  model_path: "/Users/cyan/WYH/models/bge-small-zh-v1.5"
