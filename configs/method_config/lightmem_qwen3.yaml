# LightMem Agent Configuration (ICLR 2026)

method_name: "lightmem"
method_type: "agentic_memory"
description: "LightMem - Lightweight Memory for LLM Agents"

model:
  provider: "openai"
  name: "Qwen3-235B-A22B-Instruct-2507"
  temperature: 0.3
  max_completion_tokens: 10000

# Embedding model configuration
embedding:
  provider: "local"
  model: "BAAI/bge-small-zh-v1.5"
  model_path: "/Users/cyan/WYH/models/bge-small-zh-v1.5"
  dim: 512

agent_params:
  retrieve_num: 5

  # IMPORTANT: topic_segment MUST be true for proper memory extraction
  pre_compress: false          # Enable text pre-compression (requires llmlingua-2)
  topic_segment: true          # Enable topic segmentation (REQUIRED for memory extraction)

  # Strategy configuration
  index_strategy: "embedding"       # embedding / context / hybrid
  retrieve_strategy: "embedding"    # embedding / context / hybrid
  update_mode: "offline"            # online / offline
  extraction_mode: "event"           # flat / event (dual-perspective extraction)
  messages_use: "hybrid"            # user_only / assistant_only / hybrid

  # LightMem internal LLM settings (for memory extraction)
  lightmem_temperature: 0.3
  lightmem_max_tokens: 5000
  lightmem_top_p: 0.1

  # Token limits
  max_context_tokens: 120000
