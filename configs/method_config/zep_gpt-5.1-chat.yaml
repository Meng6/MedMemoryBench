# Zep Agent Configuration

method_name: "zep"
method_type: "agentic_memory"
description: "Zep Agent - Cloud-based knowledge graph memory service with Facts/Entities/Episodes retrieval"

model:
  provider: "openai"
  name: "gpt-5.1-chat"
  temperature: 1.0
  max_completion_tokens: 100000

agent_params:
  retrieve_num: 5
  chunk_size: 512
