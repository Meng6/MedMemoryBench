# MemOS Agent Configuration

method_name: "memos"
method_type: "agentic_memory"
description: "MemOS (vendored) adapter for MedMemoryBench with configurable memory backend"

model:
  provider: "openai"
  name: "Qwen3-235B-A22B"
  temperature: 0.3
  max_completion_tokens: 10000

embedding:
  provider: "local"
  model: "bge-small-zh-v1.5"
  model_path: "/Users/cyan/WYH/models/bge-small-zh-v1.5"

agent_params:
  retrieve_num: 5
  memos_backend: "openai"
  memos_model: "Qwen3-235B-A22B"
  # Use general_text instead of naive_text to preserve Chinese language
  # naive_text translates Chinese to English, causing retrieval failures
  text_mem_type: "general_text"

  # Embedding configuration
  # embedding_provider controls the backend: "local" uses sentence_transformer, others use universal_api
  embedding_model: "bge-small-zh-v1.5"
  embedding_model_path: "/Users/cyan/WYH/models/bge-small-zh-v1.5"
  embedding_dim: 512
  embedding_provider: "local"

  max_input_tokens: 40960
  max_question_tokens: 10000
  max_context_tokens: 40960
  max_memory_tokens: 40960
