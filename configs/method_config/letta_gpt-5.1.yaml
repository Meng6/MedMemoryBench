# Letta (MemGPT) Agent Configuration

method_name: "letta"
method_type: "agentic_memory"
description: "Letta (MemGPT) local client adapter for MedMemoryBench"

model:
  provider: "openai"
  name: "gpt-5.1"
  temperature: 0.3
  max_completion_tokens: 10000

embedding:
  provider: "local"
  model: "bge-small-zh-v1.5"
  model_path: "/Users/cyan/WYH/models/bge-small-zh-v1.5"
  dim: 512

agent_params:
  # Memory retrieval settings
  retrieve_num: 5
  embedding_chunk_size: 300

  # Context window settings
  context_window: 10240

  # Agent persona settings
  memory_persona: "I am an assistant helping with medical QA while preserving long-term memory."
  memory_human: "The user is a patient in a longitudinal medical dialogue setting."

  # Token limits for memorize chunking (split long inputs into chunks)
  memorize_chunk_tokens: 6000
  memorize_chunk_overlap_tokens: 200

  # Token limits for query truncation
  max_input_tokens: 10240
  max_question_tokens: 10240
  max_context_tokens: 10240
