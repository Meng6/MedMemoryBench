# ReMem Agent Configuration (ICLR 2026)
# ReMem: Reasoning with Episodic Memory
# GitHub: https://github.com/xxx/ReMem

method_name: "remem"
method_type: "agentic_memory"
description: "ReMem - Reasoning with Episodic Memory for complex QA"

# ============================================================================
# Main Model Configuration
# ============================================================================
model:
  provider: "openai"
  name: "Qwen3-235B-A22B"
  temperature: 0.3
  max_completion_tokens: 10000

# ============================================================================
# Embedding Configuration (Local Model)
# ============================================================================
embedding:
  provider: "local"
  model: "BAAI/bge-small-zh-v1.5"
  model_path: "/Users/cyan/WYH/models/bge-small-zh-v1.5"
  dim: 512

# ============================================================================
# ReMem Specific Parameters
# ============================================================================
agent_params:
  # --------------------------------------------------------------------------
  # Information Extraction Method
  # --------------------------------------------------------------------------
  # Options:
  # - "openie": Standard OpenIE (NER + Triple extraction) - faster
  # - "episodic": Episodic fact extraction
  # - "episodic_gist": Episodic gist extraction (gists + facts) - RECOMMENDED
  # - "temporal": Temporal-aware extraction
  extract_method: "episodic_gist"

  # --------------------------------------------------------------------------
  # Graph Configuration
  # --------------------------------------------------------------------------
  is_directed_graph: false
  synonymy_edge_sim_threshold: 0.8
  synonymy_edge_topk: 10

  # --------------------------------------------------------------------------
  # Retrieval Configuration
  # --------------------------------------------------------------------------
  retrieval_top_k: 20      # Number of documents to retrieve
  qa_top_k: 10             # Number of documents to use for QA
  linking_top_k: 5         # Top-k entities for graph linking
  damping: 0.5             # PPR damping factor (0.0-1.0)
  passage_node_weight: 0.05  # Weight for passage nodes in PPR

  # --------------------------------------------------------------------------
  # Agent Configuration (optional multi-step reasoning)
  # --------------------------------------------------------------------------
  # Note: Agent mode is automatically enabled when using episodic_gist or
  # temporal extract_method. The use_agent flag is for manual override only.
  use_agent: false         # Manual override for Agent mode (usually not needed)
  agent_fixed_tools: false # Use fixed tools (semantic_retrieve + output_answer)
  agent_max_steps: 5       # Maximum agent steps

  # --------------------------------------------------------------------------
  # Cache Configuration
  # --------------------------------------------------------------------------
  use_cache: true          # Enable LLM response caching
  force_index_from_scratch: false  # Force rebuild index even if exists
  save_openie: true        # Save OpenIE extraction results

  # --------------------------------------------------------------------------
  # Text Preprocessing
  # --------------------------------------------------------------------------
  text_preprocessor_class_name: "TextPreprocessor"

  # --------------------------------------------------------------------------
  # Chunking Configuration
  # --------------------------------------------------------------------------
  chunk_size_tokens: 4096   # Maximum tokens per chunk
  chunk_overlap_tokens: 200   # Overlap between chunks

  # --------------------------------------------------------------------------
  # Embedding Settings
  # --------------------------------------------------------------------------
  embedding_batch_size: 16    # Batch size for embedding
  embedding_max_seq_len: 512  # Maximum sequence length for embedding

  # --------------------------------------------------------------------------
  # Token Limits
  # --------------------------------------------------------------------------
  max_input_tokens: 10240     # Maximum input tokens per request
  max_context_tokens: 20480  # Maximum context tokens
