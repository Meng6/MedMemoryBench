# MedMemoryBench Test Configuration - Noise Validation
# 用于验证噪声数据处理的小范围测试配置

dataset_name: "medmemorybench"
language: "zh"

data:
  root_dir: "data/MedMemoryBench"
  personas_file: null
  sessions_pattern: "persona_{id}/eval/generated_dialogues.json"
  queries_pattern: "persona_{id}/eval/generated_queries.json"
  noise_file: "persona_{id}/eval/generated_dialogues_with_noise.json"

evaluation:
  mode: "independent"
  persona_ids: [4]  # 只测试 persona_4
  max_personas: 1
  max_sessions_per_persona: 90  # 限制前90个session，覆盖第一个evaluation unit（82个session到第10个regular）

  evaluation_interval: 10

  inject_noise: true  # 启用噪声注入

query_types:
  - name: "entity_exact_match"
    abbr: "EEM"
    metric: "string_contain"
    description: "实体精确匹配"

output:
  save_intermediate: true
  save_retrieved_context: true
